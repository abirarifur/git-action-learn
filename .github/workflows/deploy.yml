name: github-action-learn
  on: push
  jobs:
    test:
      runs-on: ubuntu-leatest
      steps:
        - name: Get Code
          uses: actions/checkout@v3
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: 24
        
        - name: install dependancy
          run: npm ci
        - name: Run test
          run: npm test
