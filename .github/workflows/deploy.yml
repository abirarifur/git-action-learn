name: github-action-learn
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: install dependencies
        run: yarn install --frozen-lockfile
      - name: Run test
        run: yarn test
